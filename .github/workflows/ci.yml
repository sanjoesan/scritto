name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

      - name: Install Playwright browsers
        # firefox is required by the "Desktop Firefox (Clipboard)" project added
        # for the Kopieren/Einfügen browser matrix (playwright.config.ts); without
        # it CI fails with "Executable doesn't exist … firefox". Keep this in sync
        # with the projects declared in playwright.config.ts.
        run: npx playwright install --with-deps chromium webkit firefox

      - run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    # Serialise Pages deployments so two pushes in quick succession (this repo deploys after
    # every feature) can't race the single Pages deployment and fail with the GitHub Pages
    # "Deployment failed, try again later." error. Scoped to the deploy job only, so parallel
    # test runs are unaffected. Do NOT cancel-in-progress: a half-finished Pages deploy that
    # gets cancelled can leave the environment wedged; let each deploy finish.
    # NOTE: re-running only this job via `gh run rerun --failed` uploads a SECOND
    # `github-pages` artifact and then deploy-pages@v4 aborts with "Multiple artifacts named
    # github-pages". To retry a failed deploy, push a new commit (fresh run) instead.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
